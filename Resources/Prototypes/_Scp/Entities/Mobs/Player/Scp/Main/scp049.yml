  - MobCombat
  - MobBloodstream
  - MobRespirator
  - InventoryBase
  - StripableInventoryBase
  components:
  - type: AutoGhostRole
    disconnectDelay: 600
    pollDuration: 900
    transferDelay: 180
  - type: Sprite
    drawdepth: Mobs
    sprite: _Scp/Mobs/Scp/scp-049.rsi
    state: SCP-049
  - type: Scp
    class: Euclid
  - type: Scp049
  - type: ScpRestriction
    canBeDisarmed: true
    canStandingState: true
    canPull: true
    canMobCollide: true
  - type: ScpShow049Hud
  - type: FearSource
    uponSeenState: Anxiety
    uponComeCloser: Anxiety
    grainShaderStrength:
      min: 0
      max: 400
    vignetteShaderStrength:
      min: 0
      max: 200
  - type: ScpAnnounceOnSpawn
    text: scp049-announce-on-spawn
    channels:
    - ScientificService
    - HeavyContainmentSecurityService
  - type: Inventory
    templateId: scp049
  - type: FieldOfView
    angle: 240
  - type: Hands
  - type: Body
    prototype: Human
    requiredLegs: 2
  - type: ComplexInteraction
  - type: Buckle
  - type: Stripping
  - type: StandingState
  - type: Pacified
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.5
    baseSprintSpeed: 3.5
  - type: MobThresholds
    thresholds:
      0: Alive
      500: Critical
  - type: SlowOnDamage
    speedModifierThresholds:
      100: 0.9
      250: 0.8
      400: 0.7
  - type: Pullable
  - type: Puller
    needsHands: true
  - type: Speech
  - type: TTS
    voice: SCP049
  - type: AmbientSound
    enabled: true
    volume: -2
    range: 3
    sound:
      path: /Audio/_Scp/Scp049/breath.ogg
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepScp049
  - type: GuideHelp
    guides:
    - ScpResearch
    - ScpFear
  - type: Appearance
  - type: RotationVisuals
    defaultRotation: 90
    horizontalRotation: 90
  - type: Perishable
  - type: HoldToFace
