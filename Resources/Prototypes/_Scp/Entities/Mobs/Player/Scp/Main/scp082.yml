- type: entity
  id: Scp082
  name: SCP-082
  suffix: SCP-082
  parent:
  - BaseScp
  - BaseMob
  - MobDamageable
  - MobCombat
  - StripableInventoryBase
  - MobBloodstream
  - MobRespirator
  - MobAtmosStandard
  - MobFlammable
  - InventoryBase
  components:
  - type: AutoGhostRole
    disconnectDelay: 600
    pollDuration: 900
    transferDelay: 180
  - type: Scp
    class: Euclid
  - type: Hands
    showInHands: false
  - type: MobThresholds
    thresholds:
      0: Alive
      9500: Critical
      10000: Dead
  - type: Body
    prototype: Human
    requiredLegs: 2
  - type: Inventory
    templateId: scp082
  - type: FieldOfView
    angle: 240
  - type: Hunger
  - type: Thirst
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    sprite: _Scp/Mobs/Scp/scp-082.rsi
    state: 082_fullbody
  - type: ComplexInteraction
  - type: Buckle
  - type: ZombieImmune
  - type: SSDIndicator
  - type: Stripping
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: MovementSpeedModifier
    baseWalkSpeed: 1.5 # TO DO: добиться изменения его скорости до указанных значений, на данный момент при спавне ему задается значение 2.5 и меняется из-за Fixtures
    baseSprintSpeed: 2.5 # TO DO: добиться изменения его скорости до указанных значений, на данный момент при спавне ему задается значение 4.5 и меняется из-за Fixtures
  - type: ScpRestriction
    canPull: true
    canCarry: true
  - type: Pullable
  - type: Puller
    needsHands: true
  - type: SlowOnDamage
    speedModifierThresholds:
      3000: 0.9
      5500: 0.8
      7000: 0.7
  - type: Speech
  - type: Tag
    tags:
    - FootstepSound
    - DoorBumpOpener
  - type: MeleeWeapon
    hidden: true
    altDisarm: false
    animation: WeaponArcPunch
    wideAnimation: WeaponArcPunch
    soundHit:
      collection: Punch
    damage:
      types:
        Blunt: 40
    attackRate: 1.25
    range: 2
  - type: MeleeThrowOnHit
    speed: 2
    distance: 0.25
  - type: TTS
    voice: Dota2Pudge
  - type: GuideHelp
    guides:
    - ScpResearch
    - ScpFear
  - type: HoldToFace
  - type: Prying
    enabled: false
    pryPowered: true
    force: true
    speedModifier: 0.9
    useSound:
      path: /Audio/_Scp/Scp096/prydoor.ogg
      params:
        volume: -4
  - type: Bloodstream
    bloodRefreshAmount: 5
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 1500
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.4,0.25,0.4"
        density: 500
        mask:
        - MobMask
        layer:
        - MobLayer
